<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --accent: #22c55e;
      --muted: #9ca3af;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    article {
      background: var(--card);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    header h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    figure {
      margin: 0;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    nav a:focus,
    nav a:hover {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    section ul {
      padding-left: 1.2rem;
    }

    .time {
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Responsive layout */
    @media (min-width: 600px) {
      .container {
        flex-direction: row;
        align-items: flex-start;
      }

      .left {
        flex: 0 0 150px;
      }

      .right {
        flex: 1;
      }
    }
  </style>
</head>

<body>

  <article data-testid="test-profile-card">
    <div class="container">

      <!-- LEFT (Avatar) -->
      <div class="left">
        <figure>
          <img src="https://via.placeholder.com/150" alt="Portrait of a frontend developer"
            data-testid="test-user-avatar" />
        </figure>
      </div>

      <!-- RIGHT (Content) -->
      <div class="right">

        <header>
          <h2 data-testid="test-user-name">Jane Doe</h2>
        </header>

        <p data-testid="test-user-bio">
          Passionate frontend developer who loves building accessible, responsive web applications and learning new
          technologies.
        </p>

        <p class="time" data-testid="test-user-time" aria-live="polite">
          <!-- Time will be injected -->
        </p>

        <nav data-testid="test-user-social-links" aria-label="Social links">
          <ul>
            <li>
              <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"
                data-testid="test-user-social-twitter">Twitter</a>
            </li>
            <li>
              <a href="https://github.com" target="_blank" rel="noopener noreferrer"
                data-testid="test-user-social-github">GitHub</a>
            </li>
            <li>
              <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer"
                data-testid="test-user-social-linkedin">LinkedIn</a>
            </li>
          </ul>
        </nav>

        <section>
          <h3>Hobbies</h3>
          <ul data-testid="test-user-hobbies">
            <li>Coding</li>
            <li>Reading</li>
            <li>Gaming</li>
          </ul>
        </section>

        <section>
          <h3>Dislikes</h3>
          <ul data-testid="test-user-dislikes">
            <li>Slow internet</li>
            <li>Bad UI</li>
            <li>Debugging at 2AM</li>
          </ul>
        </section>

      </div>
    </div>
  </article>

  <script>
    const timeEl = document.querySelector('[data-testid="test-user-time"]');

    function updateTime() {
      timeEl.textContent = Date.now().toString();
    }

    updateTime();
    setInterval(updateTime, 1000);
  </script>

</body>

</html>
